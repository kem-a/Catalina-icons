<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Dark navy squircle background -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1e2a4c"/>
      <stop offset="1" stop-color="#0b1122"/>
    </linearGradient>

    <!-- Background top highlight -->
    <linearGradient id="bgh" x1="0" y1="0" x2="0" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.13"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Blue layer (top — Writer) -->
    <linearGradient id="blu" x1="0" y1="32" x2="0" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6dd4ee"/>
      <stop offset="1" stop-color="#3aacd8"/>
    </linearGradient>

    <!-- Green layer (middle — Calc) -->
    <linearGradient id="grn" x1="0" y1="52" x2="0" y2="76" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#a0dc54"/>
      <stop offset="1" stop-color="#74ba2c"/>
    </linearGradient>

    <!-- Orange layer (bottom — Impress) -->
    <linearGradient id="org" x1="0" y1="72" x2="0" y2="96" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f88c52"/>
      <stop offset="1" stop-color="#e0602a"/>
    </linearGradient>

    <!-- Gloss shine — top half fade (objectBoundingBox so it stretches to each rect) -->
    <linearGradient id="shn" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0"   stop-color="#ffffff" stop-opacity="0.40"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="1"   stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Drop shadow for each layer (cast onto the layer below) -->
    <filter id="lsh" x="-6%" y="-12%" width="112%" height="148%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#000000" flood-opacity="0.30"/>
    </filter>
  </defs>

  <!-- Squircle background -->
  <rect width="128" height="128" rx="28" ry="28" fill="url(#bg)"/>
  <!-- Top highlight -->
  <rect width="128" height="56" rx="28" ry="28" fill="url(#bgh)"/>

  <!-- ── Orange layer (bottom — drawn first so it sits behind) ── -->
  <rect x="16" y="72" width="96" height="24" rx="12" ry="12" fill="url(#org)" filter="url(#lsh)"/>
  <!-- orange shine -->
  <rect x="16" y="72" width="96" height="24" rx="12" ry="12" fill="url(#shn)"/>

  <!-- ── Green layer (middle) — casts shadow onto orange ── -->
  <rect x="16" y="52" width="96" height="24" rx="12" ry="12" fill="url(#grn)" filter="url(#lsh)"/>
  <!-- green shine -->
  <rect x="16" y="52" width="96" height="24" rx="12" ry="12" fill="url(#shn)"/>

  <!-- ── Blue layer (top) — casts shadow onto green ── -->
  <rect x="16" y="32" width="96" height="24" rx="12" ry="12" fill="url(#blu)" filter="url(#lsh)"/>
  <!-- blue shine -->
  <rect x="16" y="32" width="96" height="24" rx="12" ry="12" fill="url(#shn)"/>
</svg>
